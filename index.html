<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>San Remo Boutique</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;700&display=swap');

body { font-family: 'Inter', sans-serif; background-color: #0f0f0f; }
h1, h2, h3 { font-family: 'Playfair Display', serif; }
</style>
</head>

<body class="text-stone-200">

<header class="relative h-[95vh] w-full flex items-center justify-center text-center overflow-hidden">

  <!-- IMAGEN -->
  <div class="absolute inset-0">
    <img src="https://images.unsplash.com/photo-1558030006-450675393462?q=80&w=2070&auto=format&fit=crop"
         class="w-full h-full object-cover" />

    <!-- OVERLAY OSCURO PRO -->
    <div class="absolute inset-0 bg-black/75"></div>
  </div>

  <!-- CONTENIDO -->
  <div class="relative z-10 px-6 max-w-3xl">

    <!-- TITULO -->
    <h1 class="text-5xl md:text-6xl font-serif leading-tight mb-6 text-stone-200">
      El asado perfecto <br> empieza acá.
    </h1>

    <!-- SUB -->
    <p class="text-stone-400 text-lg mb-10">
      Selección premium lista para tu parrilla.
    </p>

    <!-- ZONAS -->
 <div class="flex justify-center gap-4 mb-10 flex-wrap">

  <span class="px-6 py-2 text-xs uppercase tracking-widest 
  border border-white/20 
  text-white/90
  bg-white/10
  backdrop-blur-md 
  hover:bg-white/10 
  hover:text-white 
  transition duration-300">
    CABA
  </span>

  <span class="px-6 py-2 text-xs uppercase tracking-widest 
  border border-white/20 
 text-white/90 
  bg-white/10
  backdrop-blur-md 
  hover:bg-white/10 
  hover:text-white 
  transition duration-300">
    GBA NORTE
  </span>

  <span class="px-6 py-2 text-xs uppercase tracking-widest 
  border border-white/20 
 text-white/90 
  bg-white/10
  backdrop-blur-md 
  hover:bg-white/10 
  hover:text-white 
  transition duration-300">
    GBA OESTE
  </span>

</div>
    <!-- BOTON -->
 <button 
onclick="document.getElementById('productos').scrollIntoView({behavior:'smooth'})"
class="px-12 py-4 text-sm uppercase tracking-widest 
text-white 
bg-gradient-to-r from-red-700 via-red-800 to-red-900 
hover:from-red-600 hover:via-red-700 hover:to-red-800 
transition duration-300 
shadow-[0_15px_40px_rgba(0,0,0,0.7)] 
border border-red-800/40 
rounded-sm"
  ARMAR MI ASADO
</button>
  </div>

</header>

<!-- ENVIO -->
<section class="max-w-3xl mx-auto p-6">
<input id="cpInput" placeholder="Tu código postal"
class="w-full p-3 bg-black border border-stone-700 mb-3">

<button onclick="calcularEnvio()" class="w-full bg-amber-700 py-2 rounded">
Calcular Envío
</button>

<div id="resultadoEnvio" class="hidden mt-3 text-sm"></div>
</section>

<!-- PRODUCTO -->
<section class="max-w-3xl mx-auto p-6">
<h2 class="text-xl mb-4">Ojo de Bife</h2>

<button onclick="addToCart('Ojo de Bife',12500)"
class="bg-amber-700 px-4 py-2 rounded">
Agregar
</button>
</section>

<!-- CARRITO -->
<div class="fixed bottom-0 right-0 bg-black p-4 w-80">
<div id="cart"></div>

<button onclick="sendToWhatsApp()"
class="bg-green-600 w-full mt-3 py-2 rounded">
WhatsApp
</button>

<a href="https://mpago.la/abcd123"
target="_blank"
class="block bg-blue-600 w-full mt-2 py-2 text-center rounded">
Mercado Pago
</a>

</div> 

<!-- CONTACTO -->
<section class="text-center mt-10">
<p>WhatsApp: 1122911567</p>
<p>Mail: carnessanremoenvios@gmail.com</p>
</section>

<script>
let cart = [];

function addToCart(n,p){
cart.push({n,p});
renderCart();
}

function renderCart(){
let html="";
let total=0;

cart.forEach((i,index)=>{
total+=i.p;
html+=`
<div class="flex justify-between">
${i.n} $${i.p}
<button onclick="removeItem(${index})">X</button>
</div>`;
});

html+=`<p>Total: $${total}</p>`;

if(total>=200000){
html+=`<p style="color:green">Envio GRATIS</p>`;
}

document.getElementById("cart").innerHTML=html;
}

function removeItem(i){
cart.splice(i,1);
renderCart();
}

function calcularEnvio(){
let cp=document.getElementById("cpInput").value;

let res=document.getElementById("resultadoEnvio");

res.classList.remove("hidden");
res.innerText="Entrega jueves y viernes. Envío se confirma por CP.";
}

function sendToWhatsApp(){
let msg="Pedido:%0A";
let total=0;

cart.forEach(i=>{
msg+=`- ${i.n} $${i.p}%0A`;
total+=i.p;
});

msg+=`Total: $${total}%0A`;

if(total>=200000){
msg+="Envio GRATIS%0A";
}

msg+="CP: ______";

window.open(`https://wa.me/5491122911567?text=${msg}`);
}
</script>
</body>
</html>
