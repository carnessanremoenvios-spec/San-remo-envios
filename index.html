<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>San Remo Boutique</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;700&display=swap');

body { font-family: 'Inter', sans-serif; background-color: #0f0f0f; }
h1, h2, h3 { font-family: 'Playfair Display', serif; }
</style>
</head>

<body class="text-stone-200">

<header class="relative h-[95vh] w-full overflow-hidden flex items-center">

  <!-- IMAGEN FONDO -->
  <div class="absolute inset-0">
    <img src="https://images.unsplash.com/photo-1558030006-450675393462?q=80&w=2070&auto=format&fit=crop"
         class="w-full h-full object-cover" />

    <!-- OVERLAY PRO (gradiente) -->
    <div class="absolute inset-0 bg-gradient-to-r from-black via-black/80 to-transparent"></div>
  </div>

  <!-- CONTENIDO -->
  <div class="relative z-10 max-w-6xl mx-auto px-6 w-full">

    <div class="max-w-xl">

      <h1 class="text-5xl md:text-6xl font-serif leading-tight mb-6">
        El asado perfecto <br> empieza acá.
      </h1>

      <p class="text-stone-400 text-lg mb-8">
        Selección premium lista para tu parrilla.
      </p>

      <!-- ZONAS -->
      <div class="flex gap-4 mb-8 flex-wrap">
        <span class="border border-stone-600 px-4 py-2 text-xs uppercase">CABA</span>
        <span class="border border-stone-600 px-4 py-2 text-xs uppercase">GBA NORTE</span>
        <span class="border border-stone-600 px-4 py-2 text-xs uppercase">GBA OESTE</span>
      </div>

      <!-- BOTÓN PRO -->
      <button 
        onclick="document.getElementById('productos').scrollIntoView({behavior:'smooth'})"
        class="bg-red-800 hover:bg-red-700 transition px-10 py-4 text-sm uppercase tracking-widest shadow-lg">
        Armar mi asado
      </button>

    </div>

  </div>

</header>

<!-- ENVIO -->
<section class="max-w-3xl mx-auto p-6">
<input id="cpInput" placeholder="Tu código postal"
class="w-full p-3 bg-black border border-stone-700 mb-3">

<button onclick="calcularEnvio()" class="w-full bg-amber-700 py-2 rounded">
Calcular Envío
</button>

<div id="resultadoEnvio" class="hidden mt-3 text-sm"></div>
</section>

<!-- PRODUCTO -->
<section class="max-w-3xl mx-auto p-6">
<h2 class="text-xl mb-4">Ojo de Bife</h2>

<button onclick="addToCart('Ojo de Bife',12500)"
class="bg-amber-700 px-4 py-2 rounded">
Agregar
</button>
</section>

<!-- CARRITO -->
<div class="fixed bottom-0 right-0 bg-black p-4 w-80">
<div id="cart"></div>

<button onclick="sendToWhatsApp()"
class="bg-green-600 w-full mt-3 py-2 rounded">
WhatsApp
</button>

<a href="https://mpago.la/abcd123"
target="_blank"
class="block bg-blue-600 w-full mt-2 py-2 text-center rounded">
Mercado Pago
</a>

</div> 

<!-- CONTACTO -->
<section class="text-center mt-10">
<p>WhatsApp: 1122911567</p>
<p>Mail: carnessanremoenvios@gmail.com</p>
</section>

<script>
let cart = [];

function addToCart(n,p){
cart.push({n,p});
renderCart();
}

function renderCart(){
let html="";
let total=0;

cart.forEach((i,index)=>{
total+=i.p;
html+=`
<div class="flex justify-between">
${i.n} $${i.p}
<button onclick="removeItem(${index})">X</button>
</div>`;
});

html+=`<p>Total: $${total}</p>`;

if(total>=200000){
html+=`<p style="color:green">Envio GRATIS</p>`;
}

document.getElementById("cart").innerHTML=html;
}

function removeItem(i){
cart.splice(i,1);
renderCart();
}

function calcularEnvio(){
let cp=document.getElementById("cpInput").value;

let res=document.getElementById("resultadoEnvio");

res.classList.remove("hidden");
res.innerText="Entrega jueves y viernes. Envío se confirma por CP.";
}

function sendToWhatsApp(){
let msg="Pedido:%0A";
let total=0;

cart.forEach(i=>{
msg+=`- ${i.n} $${i.p}%0A`;
total+=i.p;
});

msg+=`Total: $${total}%0A`;

if(total>=200000){
msg+="Envio GRATIS%0A";
}

msg+="CP: ______";

window.open(`https://wa.me/5491122911567?text=${msg}`);
}
</script>
</body>
</html>
