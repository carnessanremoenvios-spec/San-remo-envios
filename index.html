<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>San Remo Boutique - El asado perfecto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-gold': '#C49D71', // Color dorado para el logo y acentos
                        'brand-red': '#7C1E18',  // Color rojo oscuro para el botón
                        'brand-dark': '#131313',  // Fondo oscuro casi negro
                    },
                    fontFamily: {
                        'playfair': ['"Playfair Display"', 'serif'], // Tipografía serif para el título
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        /* Estilo para los botones de zona (bordes finos y transparentes) */
        .zone-btn {
            border: 1px solid rgba(255, 255, 255, 0.3);
            background-color: transparent;
            color: white;
            padding: 8px 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }
        .zone-btn:hover {
            border-color: white;
            background-color: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-brand-dark text-white font-sans antialiased">

    <section class="relative min-h-screen bg-cover bg-center bg-no-repeat" style="background-image: url('FONDO-SANREMO.png');">
        
        <div class="absolute inset-0 bg-black/50"></div>

        <div class="relative z-10 flex flex-col min-h-screen">
            
            <header class="flex items-center justify-between px-10 py-6 border-b border-white/10">
                <div class="text-brand-gold text-2xl font-bold tracking-widest uppercase">
                    San Remo <span class="font-normal">Boutique</span>
                </div>
                
                <nav class="flex items-center gap-10">
                    <a href="#" class="text-sm uppercase tracking-widest hover:text-brand-gold transition">Cortes</a>
                    <a href="#" class="text-sm uppercase tracking-widest hover:text-brand-gold transition">Zonas de Envío</a>
                    
                    <div class="flex items-center gap-2 text-sm text-brand-gold">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                        <span>+54 1221-1-567</span>
                    </div>

                    <a href="#" class="flex items-center gap-2 px-6 py-2 bg-brand-red rounded text-sm font-semibold hover:bg-red-800 transition">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        <span>Carrito</span>
                    </a>
                </nav>
            </header>

            <main class="flex-grow flex flex-col items-center justify-center text-center px-6">
                
                <h1 class="font-playfair text-6xl md:text-7xl leading-tight max-w-4xl mb-6">
                    El asado perfecto empieza acá.
                </h1>
                
                <p class="text-xl md:text-2xl text-white/80 font-light max-w-2xl mb-12">
                    Selección premium lista para tu parrilla.
                </p>
                
                <div class="flex items-center gap-4 mb-16">
                    <button class="zone-btn">CABA</button>
                    <button class="zone-btn">GBA Norte</button>
                    <button class="zone-btn">GBA Oeste</button>
                </div>
                
                <button class="px-12 py-5 bg-brand-red rounded text-base font-bold uppercase tracking-widest hover:bg-red-800 transition shadow-lg">
                    Armar mi Asado
                </button>

            </main>

        </div>
    </section>

</body>
</html>
